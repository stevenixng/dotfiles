- defaults:
    link:
      relink: true

- clean: ['~', '~/bin']

- link:
    ~/.vimrc: vimrc
    ~/.gitconfig: gitconfig
    ~/.gitignore: gitignore
    ~/src/numerator/.gitconfig: gitconfig_work
    ~/.vim: vim
    ~/.zshrc: zshrc
    ~/.tmux.conf: tmux.conf

- create:
    - ~/downloads

- shell:
  - [git submodule update --init --recursive, Installing submodules]
